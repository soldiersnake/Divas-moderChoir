<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIDEOCLIP DIVAS - Seguinos en Instagram</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: white;
      text-align: center;
      padding: 32px 20px 24px;
    }

    header .icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .list {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    .user-card {
      display: flex;
      align-items: center;
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      gap: 14px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .info {
      flex: 1;
      min-width: 0;
    }

    .username {
      font-weight: 600;
      font-size: 15px;
      color: #262626;
    }

    .sub {
      font-size: 12px;
      color: #8e8e8e;
      margin-top: 2px;
    }

    .btn-follow {
      background: linear-gradient(135deg, #833ab4, #fd1d1d);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #c7c7c7;
    }
  </style>
</head>
<body>

<header>
  <div class="icon">🎬🌐</div>
  <h1>VIDEOCLIP DIVAS</h1>
  <p>Seguinos a todxs en Instagram</p>
</header>

<div class="list">
  <script>
    const USERS = [
      "modernchoir",
      "claudiacas",
      "emili.rom",
      "mamaydiego",
      "marcelazul",
      "pacoarrais",
      "ginamariahidalgor",
      "soymarinamoreno",
      "robertogutierrez4",
      "quikeliss",
      "borjetaln",
      "patri_benavent",
      "martinagrcc",
      "marianogandulfo",
      "anaabone",
      "covadonga_sanchez_",
      "ushosero",
      "thealvarog",
      "elena_soriano98",
      "chris.molins",
      "sarapm1309",
      "cristinapryhod",
      "anaagabriel70",
      "diegoripa.84",
      "franciscohuertas",
      "mariasabatercerezo",
      "juanfranciscocayuelasgrao",
      "vivelevendredii",
    ];

    USERS.forEach(u => {
      document.write(`
        <div class="user-card">
          <div class="avatar">${u[0].toUpperCase()}</div>
          <div class="info">
            <div class="username">@${u}</div>
            <div class="sub">instagram.com/${u}</div>
          </div>
          <a class="btn-follow" href="https://instagram.com/${u}" target="_blank" rel="noopener">Ver perfil</a>
        </div>
      `);
    });
  </script>
</div>

<footer>Hecho con amor para el grupo 💜</footer>

</body>
</html>
